name: Docker Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish. Must match ^[a-zA-Z0-9_][a-zA-Z0-9_.-]{0,127}$, must NOT look like a semver alias (1, 1.2, v1.2.3, ...), and from non-main branches must be prefixed with "test-".'
        required: true

permissions:
  contents: read

concurrency:
  # Serialize ALL publishes to these images so two close-together v* tags can't
  # race on the shared mutable tags (:latest, :MAJOR, :MAJOR.MINOR).
  group: docker-publish-mininglamposs-octo-speech
  cancel-in-progress: false

env:
  IMAGE_NAME: mininglamposs/octo-speech
  IMAGE_NAME_ADMIN: mininglamposs/octo-speech-admin

jobs:
  validate:
    name: Validate inputs and ref
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag push ref
        if: github.event_name == 'push'
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tag="${REF#refs/tags/}"
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          if ! printf '%s' "$tag" | grep -Eq "$semver"; then
            echo "::error::tag '$tag' is not strict semver per semver.org (vMAJOR.MINOR.PATCH[-PRERELEASE][+BUILD]); refusing to publish"
            exit 1
          fi
          echo "OK: $REF"

      - name: Validate workflow_dispatch input and ref
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$INPUT_TAG" | grep -Eq '^[a-zA-Z0-9_][a-zA-Z0-9_.-]{0,127}$'; then
            echo "::error::tag '$INPUT_TAG' violates Docker tag grammar ^[a-zA-Z0-9_][a-zA-Z0-9_.-]{0,127}$"
            exit 1
          fi

          case "$INPUT_TAG" in
            latest|main|master)
              echo "::error::tag '$INPUT_TAG' is reserved/auto-managed; pick a different name"
              exit 1
              ;;
          esac

          if printf '%s' "$INPUT_TAG" | grep -Eq '^v?[0-9]+(\.[0-9]+){0,2}([+-].+)?$'; then
            echo "::error::tag '$INPUT_TAG' looks like a semver alias; manual publishes must use a non-semver name (or prefix with 'test-')"
            exit 1
          fi

          DEFAULT_REF="refs/heads/${DEFAULT_BRANCH}"
          if [ "$REF" != "$DEFAULT_REF" ]; then
            case "$INPUT_TAG" in
              test-*) echo "OK: non-default ref '$REF' with test- prefix" ;;
              *)
                echo "::error::manual publishes from '$REF' must use a 'test-*' tag (got '$INPUT_TAG'); merge to ${DEFAULT_BRANCH} for official tags"
                exit 1
                ;;
            esac
          fi

          echo "OK: dispatch from $REF with tag '$INPUT_TAG'"

  build-main:
    name: Build main ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: validate
    environment: docker-hub-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-publish-main-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-publish-main-${{ matrix.arch }}
          provenance: false

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests-main
          touch "/tmp/digests-main/${BUILD_DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-main-${{ matrix.arch }}
          path: /tmp/digests-main/*
          if-no-files-found: error
          retention-days: 1

  build-admin:
    name: Build admin ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: validate
    environment: docker-hub-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.admin
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME_ADMIN }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-publish-admin-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-publish-admin-${{ matrix.arch }}
          provenance: false

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests-admin
          touch "/tmp/digests-admin/${BUILD_DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-admin-${{ matrix.arch }}
          path: /tmp/digests-admin/*
          if-no-files-found: error
          retention-days: 1

  merge-main:
    name: Create multi-arch manifest (main)
    runs-on: ubuntu-latest
    needs: build-main
    environment: docker-hub-publish
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests-main
          pattern: digests-main-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests-main
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          tags=()
          while IFS= read -r tag; do
            tags+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$METADATA")

          if [ ${#tags[@]} -eq 0 ]; then
            echo "::error::metadata-action produced no tags; refusing to publish manifest"
            exit 1
          fi

          sources=()
          for f in *; do
            sources+=("${IMAGE}@sha256:${f}")
          done

          docker buildx imagetools create "${tags[@]}" "${sources[@]}"

      - name: Inspect image
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          PRIMARY_TAG: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE}:${PRIMARY_TAG}"

  merge-admin:
    name: Create multi-arch manifest (admin)
    runs-on: ubuntu-latest
    needs: build-admin
    environment: docker-hub-publish
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests-admin
          pattern: digests-admin-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME_ADMIN }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests-admin
        env:
          IMAGE: ${{ env.IMAGE_NAME_ADMIN }}
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          tags=()
          while IFS= read -r tag; do
            tags+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$METADATA")

          if [ ${#tags[@]} -eq 0 ]; then
            echo "::error::metadata-action produced no tags; refusing to publish manifest"
            exit 1
          fi

          sources=()
          for f in *; do
            sources+=("${IMAGE}@sha256:${f}")
          done

          docker buildx imagetools create "${tags[@]}" "${sources[@]}"

      - name: Inspect image
        env:
          IMAGE: ${{ env.IMAGE_NAME_ADMIN }}
          PRIMARY_TAG: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE}:${PRIMARY_TAG}"
